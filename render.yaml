services:
  - type: web
    name: sdo-attendance
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    autoDeploy: true
    disk:
      name: sdo-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/db.json
